name: rva

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rva-app:latest
    volumes:
      - ./log:/rails/log
      - ./public/uploads:/rails/public/uploads
    ports:
      - "7000:3000"
    expose:
      - "7000"
    networks: [ rva ]
    env_file:
      - .env
    environment:
      DEVISE_HOST: ${DEVISE_HOST}
      RAILS_SERVE_STATIC_FILES: ${RAILS_SERVE_STATIC_FILES}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      MAILER_USERNAME: ${MAILER_USERNAME}
      MAILER_PASSWORD: ${MAILER_PASSWORD}
      MAILER_SMTP: ${MAILER_SMTP}
      SENTRY_DSN: ${SENTRY_DSN}
      RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
    depends_on:
      - mongo
      - redis
    links:
      - mongo
      - redis
  sidekiq:
    # Reuse the exact image built for `app` so the worker and web process always
    # run identical code. Only `app` carries the build: block.
    image: rva-app:latest
    command: bundle exec sidekiq -C config/sidekiq.yml -r ./config/environment.rb
    volumes:
      - ./log:/rails/log
      - ./public/uploads:/rails/public/uploads
    networks: [ rva ]
    env_file:
      - .env
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      MAILER_USERNAME: ${MAILER_USERNAME}
      MAILER_PASSWORD: ${MAILER_PASSWORD}
      MAILER_SMTP: ${MAILER_SMTP}
      SENTRY_DSN: ${SENTRY_DSN}
    depends_on:
      - mongo
      - redis
    links:
      - mongo
      - redis
  mongo:
    image: mongo:7.0
    restart: always
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_HOST: ${MONGO_HOST}
    ports:
      - "7001:27017"
    expose:
      - "7001"
    networks: [rva]
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/mongo.js
  redis:
    image: redis:6.2-alpine
    restart: always
    env_file:
      - .env
    ports:
      - "7002:6379"
    expose:
      - "7002"
    networks: [rva]
    command: redis-server

volumes:
  mongo-data:

networks:
  rva:
    driver: bridge
